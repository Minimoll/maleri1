<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="color-scheme" content="dark" />
  <title>Sidan hittades inte — Måleri1 i Vätterbygden AB</title>
  <meta name="robots" content="noindex" />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --gold: #E5B83A;
      --gold-bright: #F0C84A;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 25% 30%, rgba(229, 184, 58, 0.10), transparent 55%),
        radial-gradient(ellipse at 75% 70%, rgba(229, 184, 58, 0.04), transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--gold);
    }

    .code {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(80px, 18vw, 180px);
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--gold);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 400;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    h1 em {
      color: var(--gold);
      font-style: italic;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--gold);
      color: var(--bg);
      padding: 14px 26px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.5px;
      text-decoration: none;
      transition: all 0.25s;
    }
    .btn:hover {
      background: var(--gold-bright);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px -8px rgba(229, 184, 58, 0.4);
    }

    @media (hover: none) {
      .btn:hover { transform: none; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid-overlay"></div>

  <main class="container">
    <div class="eyebrow">Måleri1</div>
    <div class="code">404</div>
    <h1>Sidan kunde inte <em>hittas.</em></h1>
    <p>
      Länken kan vara felstavad eller så har sidan flyttats.
      Inget farligt — vi hjälper dig hem.
    </p>
    <a href="/" class="btn">Tillbaka till startsidan →</a>
  </main>
</body>
</html>
